$kind: http-request
description: Calculates millisecond durations for each note based on the provided BPM.
url: http://localhost:5000/tempo/calculate
method: POST
body:
  type: json
  content: |-
    {
      "bpm": 60,
      "notes": [
        { "note": "Sa", "duration": 1 },
        { "note": "Re", "duration": 1 },
        { "note": "Ga", "duration": 2 }
      ]
    }
order: 4000
